<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandelbrot Psicodélico</title>
    <link rel="stylesheet" type="text/css" href="assets/css/mandelbrot.css">
</head>
<body>
<canvas id="mandelbrotCanvas"></canvas>
<div id="controls">
    <div class="control-group">
        <label for="colorMode">Modo de Color:</label>
        <select id="colorMode">
            <option value="0" selected>Océano Galáctico</option>            
            <option value="1">Fuego Cósmico</option>            
            <option value="2">Psicodélico Extremo</option>
            <option value="3">Neón Alienígena</option>
            <option value="4">Verde Naturaleza</option>
        </select>
    </div>
    <div class="control-group">
        <label for="zoomSpeed">Velocidad de Zoom: <span id="zoomSpeedValue">10</span></label>
        <input type="range" id="zoomSpeed" min="1" max="30" value="10" step="1">
    </div>
    <div class="control-group">
        <label for="pathX">Dirección X: <span id="pathXValue">-20</span></label>
        <input type="range" id="pathX" min="-100" max="100" value="-20" step="1">
    </div>
    <div class="control-group">
        <label for="pathY">Dirección Y: <span id="pathYValue">10</span></label>
        <input type="range" id="pathY" min="-100" max="100" value="10" step="1">
    </div>
    <div class="control-group">
        <button id="toggleZoom">Iniciar Zoom</button>
        <button id="resetView">Reiniciar Vista</button>
    </div>
    <div class="control-group">
        <div id="zoomLevel">Zoom: 1x</div>
    </div>
</div>

<script src="assets/js/mandelbrot.js"></script>
</body>
</html>
